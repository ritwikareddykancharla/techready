<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechReady — Mock Interview Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f75f8a;
    --accent3: #43e8b0;
    --text: #e8e8f0;
    --muted: #7070a0;
    --user-bubble: #1e1e35;
    --ai-bubble: #141424;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
    animation: blobDrift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 400px; height: 400px; background: #7c6af720; top: -100px; left: -100px; }
  .blob-2 { width: 300px; height: 300px; background: #f75f8a18; bottom: -80px; right: -80px; animation-delay: -4s; }
  .blob-3 { width: 200px; height: 200px; background: #43e8b015; top: 50%; left: 40%; animation-delay: -8s; }
  @keyframes blobDrift { from { transform: translate(0, 0) scale(1); } to { transform: translate(30px, 20px) scale(1.1); } }

  /* Layout */
  .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 16px; }

  /* Header */
  header {
    padding: 20px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent3); -webkit-text-fill-color: var(--accent3); }
  .tagline { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 100px;
    font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--muted);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .status-dot.live { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Setup Panel */
  #setup-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px 0;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .setup-hero { text-align: center; }
  .setup-hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  .setup-hero h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--accent), var(--accent2) 50%, var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .setup-hero p { color: var(--muted); font-size: 1rem; max-width: 440px; margin: 0 auto; line-height: 1.6; }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 540px;
  }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .topic-btn {
    padding: 10px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .topic-btn:hover { border-color: var(--accent); color: var(--text); }
  .topic-btn.selected {
    background: #7c6af720;
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }

  .diff-row { display: flex; gap: 8px; }
  .diff-btn {
    flex: 1;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn:hover { color: var(--text); }
  .diff-btn.selected[data-d="Easy"] { border-color: var(--accent3); color: var(--accent3); background: #43e8b015; }
  .diff-btn.selected[data-d="Medium"] { border-color: var(--accent); color: var(--accent); background: #7c6af720; }
  .diff-btn.selected[data-d="Hard"] { border-color: var(--accent2); color: var(--accent2); background: #f75f8a15; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.02em;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }
  .start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px #7c6af740; }
  .start-btn:hover::after { opacity: 0.08; }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Interview Panel */
  #interview-panel { flex: 1; display: none; flex-direction: column; gap: 0; overflow: hidden; padding-bottom: 16px; }
  #interview-panel.active { display: flex; animation: fadeUp 0.5s ease; }

  .interview-meta {
    padding: 12px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .meta-badges { display: flex; gap: 8px; }
  .badge {
    padding: 4px 10px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
  }
  .badge-topic { background: #7c6af720; color: var(--accent); border: 1px solid #7c6af740; }
  .badge-diff { background: #f75f8a15; color: var(--accent2); border: 1px solid #f75f8a30; }
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Chat area */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: none; } }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg-avatar.user { background: var(--surface2); border: 1px solid var(--border); }

  .msg-content { flex: 1; }
  .msg-sender {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .msg-bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    padding: 14px 18px;
    font-size: 0.93rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }
  .message.user .msg-bubble {
    background: var(--user-bubble);
    border-color: #2a2a50;
    border-radius: 16px 4px 16px 16px;
    color: #c8c8f0;
  }

  .typing-indicator .msg-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .action-row { display: flex; gap: 8px; }
  .action-btn {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.77rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
  }
  .action-btn:hover { color: var(--text); border-color: var(--accent); }

  .textarea-wrap { position: relative; }
  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    line-height: 1.6;
    padding: 14px 54px 14px 18px;
    resize: none;
    min-height: 56px;
    max-height: 160px;
    transition: border-color 0.2s;
    overflow-y: auto;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    position: absolute;
    right: 10px;
    bottom: 10px;
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .hint-text { font-size: 0.72rem; color: var(--muted); text-align: center; font-family: 'DM Mono', monospace; }

  /* Scrollbar */
  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 600px) {
    .topic-grid { grid-template-columns: repeat(2, 1fr); }
    .setup-hero h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="app">
  <header>
    <div>
      <div class="logo">Tech<span>Ready</span></div>
      <div class="tagline">// ai-powered mock interviews</div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">offline</span>
    </div>
  </header>

  <!-- SETUP PANEL -->
  <div id="setup-panel">
    <div class="setup-hero">
      <h1>You belong<br>in <em>tech.</em></h1>
      <p>Practice real technical interview questions with an AI coach that gives you honest, actionable feedback.</p>
    </div>

    <div class="setup-card">
      <div class="form-group">
        <label>Choose a topic</label>
        <div class="topic-grid" id="topic-grid">
          <button class="topic-btn selected" data-t="Python">🐍 Python</button>
          <button class="topic-btn" data-t="Data Structures">📊 DSA</button>
          <button class="topic-btn" data-t="System Design">🏗️ System Design</button>
          <button class="topic-btn" data-t="SQL">🗄️ SQL</button>
          <button class="topic-btn" data-t="Machine Learning">🤖 ML Basics</button>
          <button class="topic-btn" data-t="Behavioral">💬 Behavioral</button>
          <button class="topic-btn" data-t="Web APIs">🌐 Web APIs</button>
          <button class="topic-btn" data-t="OOP">📦 OOP</button>
          <button class="topic-btn" data-t="JavaScript">⚡ JavaScript</button>
        </div>
      </div>

      <div class="form-group">
        <label>Difficulty</label>
        <div class="diff-row" id="diff-row">
          <button class="diff-btn" data-d="Easy">Easy</button>
          <button class="diff-btn selected" data-d="Medium">Medium</button>
          <button class="diff-btn" data-d="Hard">Hard</button>
        </div>
      </div>

      <button class="start-btn" id="start-btn" onclick="startInterview()">
        Start Interview →
      </button>
    </div>
  </div>

  <!-- INTERVIEW PANEL -->
  <div id="interview-panel">
    <div class="interview-meta">
      <div class="meta-badges">
        <span class="badge badge-topic" id="meta-topic">Python</span>
        <span class="badge badge-diff" id="meta-diff">Medium</span>
      </div>
      <button class="reset-btn" onclick="resetInterview()">← New Session</button>
    </div>

    <div id="chat-area"></div>

    <div class="input-area">
      <div class="action-row">
        <button class="action-btn" onclick="getHint()">💡 Hint</button>
        <button class="action-btn" onclick="skipQuestion()">⏭ Skip</button>
      </div>
      <div class="textarea-wrap">
        <textarea
          id="user-input"
          placeholder="Type your answer here... (Shift+Enter for new line)"
          rows="2"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendAnswer()">↑</button>
      </div>
      <div class="hint-text">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
let selectedTopic = 'Python';
let selectedDiff = 'Medium';
let conversationHistory = [];
let isLoading = false;

// Topic buttons
document.querySelectorAll('.topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTopic = btn.dataset.t;
  });
});

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiff = btn.dataset.d;
  });
});

async function startInterview() {
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').textContent = 'Loading...';

  try {
    const res = await fetch('/api/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ topic: selectedTopic, difficulty: selectedDiff })
    });
    const data = await res.json();

    conversationHistory = data.messages;
    document.getElementById('setup-panel').style.display = 'none';
    const panel = document.getElementById('interview-panel');
    panel.classList.add('active');
    document.getElementById('meta-topic').textContent = selectedTopic;
    document.getElementById('meta-diff').textContent = selectedDiff;
    document.getElementById('status-dot').classList.add('live');
    document.getElementById('status-text').textContent = 'live';

    addMessage('ai', data.message);
  } catch (err) {
    alert('Error connecting. Check your API key and try again.');
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = 'Start Interview →';
  }
}

async function sendAnswer() {
  const input = document.getElementById('user-input');
  const answer = input.value.trim();
  if (!answer || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', answer);
  setLoading(true);

  try {
    const res = await fetch('/api/respond', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ answer, messages: conversationHistory })
    });
    const data = await res.json();
    conversationHistory = data.messages;
    addMessage('ai', data.message);
  } catch (err) {
    addMessage('ai', '⚠️ Something went wrong. Please try again.');
  }
  setLoading(false);
}

async function getHint() {
  if (isLoading) return;
  setLoading(true);
  try {
    const res = await fetch('/api/hint', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: conversationHistory })
    });
    const data = await res.json();
    addMessage('ai', '💡 ' + data.message);
  } catch (err) {
    addMessage('ai', '⚠️ Could not fetch hint.');
  }
  setLoading(false);
}

async function skipQuestion() {
  if (isLoading) return;
  setLoading(true);
  try {
    const res = await fetch('/api/skip', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: conversationHistory, topic: selectedTopic })
    });
    const data = await res.json();
    conversationHistory = data.messages;
    addMessage('ai', data.message);
  } catch (err) {
    addMessage('ai', '⚠️ Could not skip.');
  }
  setLoading(false);
}

function resetInterview() {
  conversationHistory = [];
  document.getElementById('chat-area').innerHTML = '';
  document.getElementById('interview-panel').classList.remove('active');
  document.getElementById('setup-panel').style.display = 'flex';
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').textContent = 'Start Interview →';
  document.getElementById('status-dot').classList.remove('live');
  document.getElementById('status-text').textContent = 'offline';
}

function addMessage(role, text) {
  const area = document.getElementById('chat-area');
  const typing = document.getElementById('typing-indicator');
  if (typing) typing.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-avatar ${role}">${role === 'ai' ? '🪿' : '👩'}</div>
    <div class="msg-content">
      <div class="msg-sender">${role === 'ai' ? 'TechReady AI' : 'You'}</div>
      <div class="msg-bubble">${escapeHtml(text)}</div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message typing-indicator';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar ai">🪿</div>
    <div class="msg-content">
      <div class="msg-sender">TechReady AI</div>
      <div class="msg-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setLoading(state) {
  isLoading = state;
  document.getElementById('send-btn').disabled = state;
  if (state) showTyping();
  else {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAnswer();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}
</script>
</body>
</html>
