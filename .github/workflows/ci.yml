name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check & Lint
      run: npm run lint

    - name: Build
      run: npm run build
      env:
        # Provide a dummy string so the build doesn't fail if OPENROUTER_API_KEY is accidentally checked in static code, though we fixed this.
        OPENROUTER_API_KEY: 'ci-dummy-key'
